<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BISONS ELITE - Stage Tennis de Table</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div id="google_translate_element"></div>

    <nav class="lang-selector">
        <button class="lang-btn" onclick="translatePage('fr')">FR 🇫🇷</button>
        <button class="lang-btn" onclick="translatePage('en')">EN 🇬🇧</button>
        <button class="lang-btn" onclick="translatePage('es')">ES 🇪🇸</button>
        <button class="lang-btn" onclick="translatePage('zh-CN')">CN 🇨🇳</button>
    </nav>

    <main>
        <section class="hero-section">
            <div class="hero-content">
                <span id="hero-badge" class="bisons-badge">Loading...</span>
                <h1 id="hero-title" class="hero-title">Loading...</h1>
                <p id="hero-description" class="hero-description">Loading...</p>
                <button id="hero-cta" class="bisons-button">Loading...</button>
            </div>
            <div class="hero-visual">
                <span class="bisons-logo-text">BISONS</span>
            </div>
        </section>

        <section class="adn-section">
            <div class="adn-grid">
                <div class="adn-content">
                    <h2 id="adn-title" class="section-title">Loading...</h2>
                    <p id="adn-text" class="adn-text">Loading...</p>
                </div>
                <div class="adn-visual">
                    <img id="adn-image" src="" alt="Bisons Stage" class="robust-img">
                </div>
            </div>
        </section>

        <section class="gallery-section">
            <h2 id="gallery-title" class="section-title text-center">Loading...</h2>
            <div id="gallery-grid" class="gallery-grid"></div>
        </section>

        <section class="advantages-section">
            <h2 id="advantages-title" class="section-title text-center">Loading...</h2>
            <div id="advantages-grid" class="grid-container"></div>
        </section>

        <section class="staff-section">
            <h2 id="staff-title" class="section-title text-center">Loading...</h2>
            <div id="staff-grid" class="staff-grid"></div>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch('./content.json')
                .then(response => response.json())
                .then(data => {
                    // Remplissage des blocs
                    document.getElementById('hero-badge').textContent = data.hero?.badge || '';
                    document.getElementById('hero-title').textContent = data.hero?.title || '';
                    document.getElementById('hero-description').textContent = data.hero?.description || '';
                    document.getElementById('hero-cta').textContent = data.hero?.cta || '';

                    document.getElementById('adn-title').textContent = data.adn?.title || '';
                    document.getElementById('adn-text').textContent = data.adn?.description || '';
                    document.getElementById('adn-image').src = data.adn?.image || '';

                    document.getElementById('gallery-title').textContent = data.gallery?.title || '';
                    const galleryGrid = document.getElementById('gallery-grid');
                    galleryGrid.innerHTML = '';
                    (data.gallery?.images || []).forEach(imgUrl => {
                        galleryGrid.innerHTML += `<div class="gallery-item"><img src="${imgUrl}" class="robust-img" alt="Bisons"></div>`;
                    });

                    document.getElementById('advantages-title').textContent = data.advantages?.title || '';
                    const advGrid = document.getElementById('advantages-grid');
                    advGrid.innerHTML = '';
                    (data.advantages?.items || []).forEach(item => {
                        advGrid.innerHTML += `
                            <div class="advantage-card">
                                <div class="card-icon">${item.icon || '⚡'}</div>
                                <h3 class="card-title">${item.title || ''}</h3>
                                <p class="card-desc">${item.description || ''}</p>
                            </div>`;
                    });

                    document.getElementById('staff-title').textContent = data.staff?.title || '';
                    const staffGrid = document.getElementById('staff-grid');
                    staffGrid.innerHTML = '';
                    (data.staff?.members || []).forEach(coach => {
                        staffGrid.innerHTML += `
                            <div class="staff-card">
                                <span class="staff-role">${coach.role || ''}</span>
                                <h3 class="staff-name">${coach.name || ''}</h3>
                                <div class="staff-stats">
                                    <div class="stat-row"><span class="stat-label">Prise</span><span class="stat-value">${coach.grip || ''}</span></div>
                                    <div class="stat-row"><span class="stat-label">Style</span><span class="stat-value">${coach.style || ''}</span></div>
                                    <div class="stat-row highlight"><span class="stat-label">Classement</span><span class="stat-value">${coach.rank || ''}</span></div>
                                </div>
                            </div>`;
                    });

                    // Lancement de Google Translate une fois le JSON chargé
                    initGoogleTranslate();
                })
                .catch(err => console.error("Erreur JSON:", err));
        });

        function initGoogleTranslate() {
            const script = document.createElement('script');
            script.type = 'text/javascript';
            script.src = '//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
            document.body.appendChild(script);
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'fr',
                includedLanguages: 'fr,en,es,zh-CN',
                autoDisplay: false
            }, 'google_translate_element');

            // Force la langue stockée ou celle du navigateur
            setTimeout(() => {
                let savedLang = localStorage.getItem('bisons-lang');
                if (savedLang) translatePage(savedLang);
            }, 500);
        }

        function translatePage(langCode) {
            localStorage.setItem('bisons-lang', langCode);
            const select = document.querySelector('.goog-te-combo');
            if (select) {
                select.value = langCode;
                select.dispatchEvent(new Event('change'));
            }
        }
    </script>
</body>
</html>
