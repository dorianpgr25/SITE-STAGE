<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BISONS ELITE - Stage Tennis de Table</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div id="google_translate_element" style="visibility:hidden;position:absolute;top:-9999px;"></div>

    <nav class="lang-selector">
        <button class="lang-btn" onclick="translateInstant('fr')">FR 🇫🇷</button>
        <button class="lang-btn" onclick="translateInstant('en')">EN 🇬🇧</button>
        <button class="lang-btn" onclick="translateInstant('es')">ES 🇪🇸</button>
        <button class="lang-btn" onclick="translateInstant('zh-CN')">CN 🇨🇳</button>
    </nav>

    <main>
        <section class="hero-section">
            <div class="hero-content">
                <span id="hero-badge" class="bisons-badge">Loading...</span>
                <h1 id="hero-title" class="hero-title">Loading...</h1>
                <p id="hero-description" class="hero-description">Loading...</p>
                <button id="hero-cta" class="bisons-button">Loading...</button>
            </div>
            <div class="hero-visual">
                <img src="https://instagram.fcdg4-1.fna.fbcdn.net/v/t51.2885-19/465397874_1565951647620583_4681574217412429060_n.jpg?stp=dst-jpg_s150x150_tt6&efg=eyJ2ZW5jb2RlX3RhZyI6InByb2ZpbGVfcGljLmRqYW5nby44MjguYzIifQ&_nc_ht=instagram.fcdg4-1.fna.fbcdn.net&_nc_cat=107&_nc_oc=Q6cZ2gHDrITLoWgV_AUWkO9WFxT9FgCudUIyXvcFsUZJQNvCNDXWrol61Z5qPDev1B5Gpfd48yB3YPqlnp2CVCXrWYX5&_nc_ohc=pKuP2gKDxagQ7kNvwEQxBNl&_nc_gid=0TX3CsmZhMI_kGTCNvFIpQ&edm=AOQ1c0wBAAAA&ccb=7-5&oh=00_Af8vZSR0P6BiS2tAdkW176msxlqtbjjBvt28NK07rH4fLQ&oe=6A30C8DF&_nc_sid=8b3546" class="bisons-logo-img" alt="Logo Bisons">
        </div>
        </section>

        <section class="adn-section">
            <div class="adn-grid">
                <div class="adn-content">
                    <h2 id="adn-title" class="section-title">Loading...</h2>
                    <p id="adn-text" class="adn-text">Loading...</p>
                </div>
                <div class="adn-visual">
                    <img id="adn-image" src="" alt="Bisons Stage" class="robust-img">
                </div>
            </div>
        </section>

        <section class="gallery-section">
            <h2 id="gallery-title" class="section-title text-center">Loading...</h2>
            <div id="gallery-grid" class="gallery-grid"></div>
        </section>

        <section class="advantages-section">
            <h2 id="advantages-title" class="section-title text-center">Loading...</h2>
            <div id="advantages-grid" class="grid-container"></div>
        </section>

        <section class="staff-section">
            <h2 id="staff-title" class="section-title text-center">Loading...</h2>
            <div id="staff-grid" class="staff-grid"></div>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 1. On charge d'abord le contenu JSON
            fetch('./content.json')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('hero-badge').textContent = data.hero?.badge || '';
                    document.getElementById('hero-title').textContent = data.hero?.title || '';
                    document.getElementById('hero-description').textContent = data.hero?.description || '';
                    document.getElementById('hero-cta').textContent = data.hero?.cta || '';

                    document.getElementById('adn-title').textContent = data.adn?.title || '';
                    document.getElementById('adn-text').textContent = data.adn?.description || '';
                    document.getElementById('adn-image').src = data.adn?.image || '';

                    document.getElementById('gallery-title').textContent = data.gallery?.title || '';
                    const galleryGrid = document.getElementById('gallery-grid');
                    galleryGrid.innerHTML = '';
                    (data.gallery?.images || []).forEach(imgUrl => {
                        galleryGrid.innerHTML += `<div class="gallery-item"><img src="${imgUrl}" class="robust-img" alt="Bisons"></div>`;
                    });

                    document.getElementById('advantages-title').textContent = data.advantages?.title || '';
                    const advGrid = document.getElementById('advantages-grid');
                    advGrid.innerHTML = '';
                    (data.advantages?.items || []).forEach(item => {
                        advGrid.innerHTML += `
                            <div class="advantage-card">
                                <div class="card-icon">${item.icon || '⚡'}</div>
                                <h3 class="card-title">${item.title || ''}</h3>
                                <p class="card-desc">${item.description || ''}</p>
                            </div>`;
                    });

                    document.getElementById('staff-title').textContent = data.staff?.title || '';
                    const staffGrid = document.getElementById('staff-grid');
                    staffGrid.innerHTML = '';
                    (data.staff?.members || []).forEach(coach => {
                        staffGrid.innerHTML += `
                            <div class="staff-card">
                                <span class="staff-role">${coach.role || ''}</span>
                                <h3 class="staff-name">${coach.name || ''}</h3>
                                <div class="staff-stats">
                                    <div class="stat-row"><span class="stat-label">Prise</span><span class="stat-value">${coach.grip || ''}</span></div>
                                    <div class="stat-row"><span class="stat-label">Style</span><span class="stat-value">${coach.style || ''}</span></div>
                                    <div class="stat-row highlight"><span class="stat-label">Classement</span><span class="stat-value">${coach.rank || ''}</span></div>
                                </div>
                            </div>`;
                    });

                    // 2. On injecte l'API Google Translate juste après la data
                    const script = document.createElement('script');
                    script.type = 'text/javascript';
                    script.src = '//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
                    document.body.appendChild(script);
                })
                .catch(err => console.error("Erreur de chargement JSON :", err));
        });

        // Initialisation de l'iframe Google en mode silencieux
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'fr',
                includedLanguages: 'fr,en,es,zh-CN',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');

            // Applique directement la langue si l'utilisateur a déjà fait un choix auparavant
            setTimeout(() => {
                let currentLang = localStorage.getItem('bisons-lang');
                if (currentLang && currentLang !== 'fr') {
                    translateInstant(currentLang);
                }
            }, 300);
        }

        // LE MOTEUR DU CLIC DE TRADUCTION DIRECTE
        function translateInstant(langCode) {
            localStorage.setItem('bisons-lang', langCode);
            
            // Si c'est le français, on réinitialise pour éviter les conflits de cache Google
            if (langCode === 'fr') {
                const iframe = document.querySelector('.goog-te-banner-frame');
                if (iframe) {
                    const restoreBtn = iframe.contentWindow.document.getElementById(':1.restore');
                    if (restoreBtn) restoreBtn.click();
                } else {
                    location.reload(); // Solution de secours propre pour restaurer le français d'origine
                }
                return;
            }

            // Pour les autres langues, on force la sélection dans le composant masqué
            const selectContainer = document.querySelector('.goog-te-combo');
            if (selectContainer) {
                selectContainer.value = langCode;
                selectContainer.dispatchEvent(new Event('change'));
            } else {
                // Si l'API met une demi-seconde de plus à répondre, on réessaye immédiatement
                setTimeout(() => {
                    const retrySelect = document.querySelector('.goog-te-combo');
                    if (retrySelect) {
                        retrySelect.value = langCode;
                        retrySelect.dispatchEvent(new Event('change'));
                    }
                }, 150);
            }
        }
    </script>
</body>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      // Force l'ouverture de la boîte de dialogue si on vient d'un lien d'invitation ou de reset
      if (window.location.hash) {
        document.addEventListener("DOMContentLoaded", () => {
          setTimeout(() => {
            window.netlifyIdentity.open();
          }, 500);
        });
      }

      // Gestion de la redirection après connexion
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
</body>
</html>
